{% extends "base.html" %}
{% block title %}Kayıt Ol{% endblock %}
{% block extra_js %}
<script src="https://www.google.com/recaptcha/api.js" async defer></script>
{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1 class="auth-logo">Nobi</h1>
        <h2>Create Account</h2>
        <form method="POST">
            <div class="form-group">
                <input type="email" name="email" placeholder="Email" required class="form-input">
            </div>
            <div class="form-group">
                <input type="text" name="username" placeholder="Username" required class="form-input">
            </div>
            <div class="form-group">
                <input type="text" name="nickname" placeholder="Nickname" required class="form-input">
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Password (min 6 characters)" required class="form-input" minlength="6">
            </div>
            <div class="form-group">
                <input type="password" name="confirm_password" placeholder="Confirm Password" required class="form-input" minlength="6">
            </div>
            <div class="form-group" style="text-align:left;">
                <label class="checkbox-label">
                    <input type="checkbox" name="agree_rules" required>
                    <span><a href="{{ url_for('rules') }}" target="_blank" style="color:var(--accent);">Topluluk kurallarını</a> okudum ve kabul ediyorum</span>
                </label>
            </div>
            <div class="form-group" style="display:flex;justify-content:center;">
                <div class="g-recaptcha" data-sitekey="{{ config.RECAPTCHA_SITE_KEY }}"></div>
            </div>
            <button type="submit" class="btn-primary btn-full">Register</button>
        </form>
        <p class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Sign In</a></p>
    </div>
</div>
{% endblock %}
