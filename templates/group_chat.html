{% extends "base.html" %}
{% block title %}{{ group.name }}{% endblock %}
{% block content %}
<div class="chat-container" style="display:flex;flex-direction:column;height:calc(100dvh - var(--nav-height));">
    <div class="chat-header" style="flex-shrink:0;display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);">
        <a href="{{ url_for('groups') }}" class="back-btn" style="font-size:1.3rem;">←</a>
        <h3 style="font-size:1rem;margin:0;"># {{ group.name }}</h3>
        <span class="member-count" style="font-size:0.8rem;color:var(--text2);margin-left:auto;">{{ group.members.count() }} üye</span>
        {% if current_user.id == group.created_by or current_user.role in ('owner','admin') %}
        <button style="border-color:var(--danger);color:var(--danger);background:none;border:1px solid;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:0.75rem;" onclick="deleteGroup()">Grubu Sil</button>
        {% endif %}
    </div>
    <div class="chat-messages" id="groupMessages" style="flex:1;overflow-y:auto;padding:12px 14px;min-height:0;"></div>
    <div class="chat-input" style="display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--border);flex-shrink:0;">
        <input type="text" id="groupMessageInput" placeholder="Mesaj yaz..." style="flex:1;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:24px;color:var(--text);font-size:16px;outline:none;" onkeydown="if(event.key==='Enter') sendGroupMessage()">
        <button onclick="sendGroupMessage()" style="padding:12px 24px;background:var(--accent);color:#fff;border:none;border-radius:24px;cursor:pointer;font-weight:600;font-size:15px;white-space:nowrap;">Gönder</button>
    </div>
</div>

<script>
var groupId = {{ group.id }};

function loadGroupMessages() {
    fetch('/api/groups/' + groupId + '/messages')
    .then(function(r) { return r.json(); })
    .then(function(msgs) {
        var container = document.getElementById('groupMessages');
        container.innerHTML = msgs.map(function(m) {
            var isOwn = m.sender_id === {{ current_user.id }};
            var roleBadge = (m.sender_role && m.sender_role !== 'user') ? ' <span class="role-badge-xs" style="background:' + ({owner:'#ffd700',admin:'#fe2c55',moderator:'#20d5ec'}[m.sender_role]||'#888') + '">' + ({owner:'Owner',admin:'Admin',moderator:'Mod'}[m.sender_role]||'') + '</span>' : '';
            var verified = m.sender_verified ? ' <span class="verified-badge">✓</span>' : '';
            return '<div class="msg' + (isOwn ? ' msg-own' : '') + '">' +
                '<strong>' + m.sender_name + '</strong>' + verified + roleBadge +
                '<p>' + escapeHtml(m.content) + '</p>' +
                '<small>' + new Date(m.created_at).toLocaleTimeString() + '</small>' +
                '</div>';
        }).join('');
        container.scrollTop = container.scrollHeight;
    });
}

function sendGroupMessage() {
    var input = document.getElementById('groupMessageInput');
    var content = input.value.trim();
    if (!content) return;
    fetch('/api/groups/send', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({group_id: groupId, content: content})
    })
    .then(function(r) { return r.json(); })
    .then(function() { input.value = ''; loadGroupMessages(); });
}

function deleteGroup() {
    if (!confirm('Grubu silmek istediğinize emin misiniz?')) return;
    fetch('/admin/delete_group/' + groupId, { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function() { location.href = '/groups'; });
}

function escapeHtml(text) {
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

loadGroupMessages();
setInterval(loadGroupMessages, 3000);
</script>
{% endblock %}
