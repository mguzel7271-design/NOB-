<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakım Modu - Nobi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #000; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 20px; }
        .maintenance-card { max-width: 400px; }
        h1 { font-size: 3rem; color: #fe2c55; margin-bottom: 10px; }
        h2 { font-size: 1.3rem; margin-bottom: 12px; }
        p { color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="maintenance-card">
        <h1>🔧</h1>
        <h2>Nobi Bakımda</h2>
        <p>Platformumuz şu anda bakım çalışması nedeniyle geçici olarak kullanılamıyor. Kısa süre içinde tekrar yayında olacağız.</p>
    </div>
</body>
</html>
